<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awei AI pro vs Chat-GPT 雷达图对比</title>
    <!-- 引入 ECharts 核心库 -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f7f9fc; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        #main {
            width: 900px;
            height: 800px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 20px;
        }
        /* 适配小屏幕 */
        @media (max-width: 600px) {
            #main {
                width: 100%;
                height: 600px;
                padding: 10px;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>

    <!-- 图表容器 -->
    <div id="main"></div>

    <script>
        // 初始化 echarts 实例
        var myChart = echarts.init(document.getElementById('main'));

        // 指标名称（顺序保持图一致）
        const indicatorNames = [
            'ARC-Easy', 'AGIEval', 'CMMLU (ZH)', 'CLUEWSC (ZH)', 'CHID (ZH)',
            'CEval (ZH)', 'BBH-ZH (ZH)', 'WinoGrande', 'TriviaQA', 'RACE-Middle',
            'PIQA', 'NaturalQuestions', 'MMLU', 'MBPP', 'MATH',
            'HumanEval', 'HellaSwag', 'GSM8K', 'DROP', 'BBH'
        ];

        // Chat-GPT 数据 (对应原图的绿色线)
        const chatGPTData = [
            62.9, 37.2, 53.4, 76.5, 51.4,
            37.2, 70.4, 75.4, 79.1, 70.1,
            81.7, 36.6, 71.3, 55.6, 5.6,
            15.2, 81.0, 58.4, 69.2, 68.7
        ];

        // Awei AI pro 数据 (对应原图的蓝色线)
        const aweiData = [
            76.9, 41.3, 70.8, 81.0, 92.1,
            66.1, 82.6, 79.8, 78.9, 69.9,
            83.6, 36.6, 59.0, 57.4, 18.7,
            42.7, 84.0, 63.4, 67.9, 68.7
        ];

        // 配置项
        var option = {
            // 颜色自定义：绿色 (Chat-GPT), 蓝色 (Awei AI pro)
            color: ['#6faeb2', '#4b7ef6'],
            
            // 提示框
            tooltip: {
                trigger: 'item'
            },
            
            // 图例配置 (位于底部中间) - 已更新名称
            legend: {
                data: ['Chat-GPT', 'Awei AI pro'],
                bottom: '5%',
                left: 'center',
                icon: 'circle', // 圆点图例
                itemWidth: 8,
                itemHeight: 8,
                textStyle: {
                    fontSize: 14,
                    fontWeight: 'bold',
                    color: '#333'
                }
            },

            // 雷达图坐标系配置
            radar: {
                shape: 'polygon',
                radius: '65%',
                center: ['50%', '50%'],
                indicator: indicatorNames.map(name => ({ name: name, max: 100 })),
                axisName: {
                    color: '#000000',
                    fontWeight: 'bold',
                    fontSize: 13
                },
                splitArea: {
                    show: true,
                    areaStyle: {
                        color: ['#f1f5fd'] 
                    }
                },
                axisLine: {
                    lineStyle: {
                        color: '#e0e0e0'
                    }
                },
                splitLine: {
                    lineStyle: {
                        color: '#dcdcdc'
                    }
                }
            },

            // 数据系列配置
            series: [
                {
                    name: '模型性能对比',
                    type: 'radar',
                    label: {
                        show: true,
                        formatter: function (params) {
                            return params.value;
                        },
                        color: '#333', 
                        fontSize: 11,
                        fontWeight: 'bold'
                    },
                    lineStyle: {
                        width: 2.5
                    },
                    symbol: 'circle',
                    symbolSize: 6,
                    areaStyle: {
                        color: 'transparent'
                    },
                    // 数据载入 - 已更新名称对应
                    data: [
                        {
                            value: chatGPTData,
                            name: 'Chat-GPT'
                        },
                        {
                            value: aweiData,
                            name: 'Awei AI pro'
                        }
                    ]
                }
            ]
        };

        // 渲染图表
        myChart.setOption(option);

        // 窗口大小变化时自动重绘
        window.addEventListener('resize', function() {
            myChart.resize();
        });
    </script>
</body>
</html>
